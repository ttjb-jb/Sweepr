// ── SHARED SCORING LOGIC (mirrors World Cup app) ─────────────
const DEFAULT_SCORING={groupWin:3,groupDraw:1,groupLoss:0,playoff:1,r32:2,r16:4,qf:6,sf:10,runnerUp:15,champion:25};

function calcPlayerPoints(playerName,sw){
  const{assignments={},matches={},fixtures=[],knockout=null}=sw;
  const scoring={...DEFAULT_SCORING,...(sw.scoring||{})};
  let pts=0;
  const myTeams=Object.keys(assignments).filter(t=>assignments[t]===playerName);

  function scoreMatch(m){
    if(!m.played)return;
    const hs=parseInt(m.homeScore)||0,as=parseInt(m.awayScore)||0;
    if(myTeams.includes(m.home)){pts+=hs>as?scoring.groupWin:hs===as?scoring.groupDraw:scoring.groupLoss;}
    if(myTeams.includes(m.away)){pts+=as>hs?scoring.groupWin:as===hs?scoring.groupDraw:scoring.groupLoss;}
  }

  // Group-stage style matches (object of arrays, keyed by group)
  Object.values(matches).forEach(gm=>{
    (Array.isArray(gm)?gm:Object.values(gm)).forEach(scoreMatch);
  });

  // League-style fixtures (flat array)
  fixtures.forEach(scoreMatch);

  if(knockout){
    [{r:"playoff",p:scoring.playoff},{r:"r32",p:scoring.r32},{r:"r16",p:scoring.r16},{r:"qf",p:scoring.qf},{r:"sf",p:scoring.sf}].forEach(({r,p})=>{
      (knockout[r]||[]).forEach(m=>{if(m.winner&&myTeams.includes(m.winner))pts+=p;});
    });
    (knockout.final||[]).forEach(m=>{
      if(!m.winner)return;
      const loser=m.winner===m.home?m.away:m.home;
      if(myTeams.includes(m.winner))pts+=scoring.champion;
      if(myTeams.includes(loser))pts+=scoring.runnerUp;
    });
  }
  return pts;
}

// Returns leaderboard sorted by points desc: [{player,points}]
function buildLeaderboard(sw){
  const players=sw.players||[];
  return players.map(p=>({player:p,points:calcPlayerPoints(p,sw)})).sort((a,b)=>b.points-a.points);
}

// Resolve a sweepstake doc + current user into the card shape the dashboard needs
function toCardData(id,sw,userId){
  const myPlayerName=Object.entries(sw.playerUserIds||{}).find(([name,uid])=>uid===userId)?.[0];
  const lb=buildLeaderboard(sw);
  const myEntry=myPlayerName?lb.find(e=>e.player===myPlayerName):null;
  const position=myEntry?lb.findIndex(e=>e.player===myPlayerName)+1:null;
  return{
    id,
    name:sw.name,
    tournament:sw.tournamentName||sw.name,
    role:sw.ownerId===userId?"organiser":"player",
    players:(sw.players||[]).length,
    status:sw.status||"setup",
    myPoints:myEntry?myEntry.points:0,
    position,
    totalPlayers:(sw.players||[]).length,
    icon:sw.icon||"⚽",
    archived:!!sw.archived,
  };
}

// Number of teams a given player name owns in a sweepstake (assignments maps team->player)
function teamsOwnedBy(playerName,sw){
  return Object.values(sw.assignments||{}).filter(p=>p===playerName).length;
}

// Aggregates a single user's stats across ALL sweepstakes they're linked to via playerUserIds.
// Pass in the full list of sweepstake docs (already fetched) to avoid extra reads.
function computeUserStats(userId,allSweepstakes){
  let totalPoints=0,totalTeams=0,sweepstakeCount=0;
  allSweepstakes.forEach(sw=>{
    const playerName=Object.entries(sw.playerUserIds||{}).find(([name,uid])=>uid===userId)?.[0];
    if(!playerName)return;
    const teams=teamsOwnedBy(playerName,sw);
    if(teams===0&&sw.status==="setup")return; // not yet drawn, don't count
    sweepstakeCount++;
    totalTeams+=teams;
    totalPoints+=calcPlayerPoints(playerName,sw);
  });
  return{
    totalPoints,
    totalTeams,
    sweepstakeCount,
    pointsPerSweepstake:sweepstakeCount>0?totalPoints/sweepstakeCount:0,
    pointsPerTeam:totalTeams>0?totalPoints/totalTeams:0,
  };
}

// ── DISPLAY NAME PROMPT ───────────────────────────────────────
function DisplayNamePrompt({user,onDone}){
  const[name,setName]=useState("");
  const[saving,setSaving]=useState(false);
  const[error,setError]=useState("");

  async function save(e){
    e.preventDefault();
    if(!name.trim()){setError("Enter a name, or skip for now");return;}
    setSaving(true);setError("");
    try{
      const{db,doc,setDoc}=window._fb;
      await setDoc(doc(db,"users",user.uid),{displayName:name.trim(),promptSeen:true},{merge:true});
      onDone();
    }catch(e){setError(e.message);}
    finally{setSaving(false);}
  }

  async function skip(){
    try{
      const{db,doc,setDoc}=window._fb;
      await setDoc(doc(db,"users",user.uid),{promptSeen:true},{merge:true});
    }catch(e){/* non-fatal, just close */}
    onDone();
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div className="fade-up" style={{background:C.pitchLight,border:`1px solid ${C.pitchBorder}`,borderRadius:14,padding:28,width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:18}}>
          <div style={{fontSize:32,marginBottom:8}}>👋</div>
          <div className="display" style={{fontSize:18,marginBottom:6}}>Pick a Display Name</div>
          <div className="mono" style={{fontSize:12,color:C.chalkDim,lineHeight:1.5}}>
            This is shown on the public Global Leaderboard instead of your email — your email is never shown to other users.
          </div>
        </div>
        <form onSubmit={save}>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. JordanB" autoFocus style={fieldInput}/>
          {error&&<div style={{color:C.red,fontSize:12,marginTop:8,fontWeight:600}}>{error}</div>}
          <button type="submit" disabled={saving} style={{
            width:"100%",marginTop:16,padding:"12px 0",borderRadius:8,border:"none",
            background:AMBER_GRADIENT,color:C.pitch,fontWeight:800,fontSize:14,cursor:saving?"default":"pointer",opacity:saving?0.7:1
          }}>{saving?"Saving...":"Save"}</button>
          <button type="button" onClick={skip} style={{
            width:"100%",marginTop:8,padding:"10px 0",borderRadius:8,border:"none",

function Dashboard({user,onLogout,onOpenSweepstake,onCreateNew,onJoinViaInvite,onManagePresets,onGlobalLeaderboard}){
  const[sweepstakes,setSweepstakes]=useState([]);
  const[rawSweepstakes,setRawSweepstakes]=useState([]);
  const[invites,setInvites]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState("");
  const[showArchived,setShowArchived]=useState(false);
  const[showNamePrompt,setShowNamePrompt]=useState(false);
  const[myProfile,setMyProfile]=useState(null);

  useEffect(()=>{
    if(!user)return;
    const{db,doc,getDoc}=window._fb;
    getDoc(doc(db,"users",user.uid)).then(snap=>{
      const profile=snap.exists()?snap.data():null;
      setMyProfile(profile);
      if(!profile||!profile.promptSeen)setShowNamePrompt(true);
    }).catch(()=>{});
  },[user]);

  useEffect(()=>{
    if(!user)return;
    const{db,collection,query,where,onSnapshot}=window._fb;
    setLoading(true);

    // Sweepstakes where user is the owner
    const ownedQ=query(collection(db,"sweepstakes"),where("ownerId","==",user.uid));
    // Sweepstakes where user is listed as a participant (via memberIds array)
    const memberQ=query(collection(db,"sweepstakes"),where("memberIds","array-contains",user.uid));

    let owned=[],member=[];
    function merge(){
      const map={};
      [...owned,...member].forEach(({id,data})=>{map[id]=data;});
      const rawList=Object.entries(map).map(([id,sw])=>({id,...sw}));
      setRawSweepstakes(rawList);
      const cards=rawList.map(sw=>toCardData(sw.id,sw,user.uid));
      setSweepstakes(cards);
      setLoading(false);
    }

    const unsub1=onSnapshot(ownedQ,snap=>{
      owned=snap.docs.map(d=>({id:d.id,data:d.data()}));
      merge();
    },err=>{setError(err.message);setLoading(false);});

    const unsub2=onSnapshot(memberQ,snap=>{
      member=snap.docs.map(d=>({id:d.id,data:d.data()}));
      merge();
    },err=>{setError(err.message);setLoading(false);});

    // Invites addressed to this user's email
    const invitesQ=query(collection(db,"invites"),where("inviteeEmail","==",user.email),where("status","==","pending"));
    const unsub3=onSnapshot(invitesQ,snap=>{
      setInvites(snap.docs.map(d=>({id:d.id,...d.data()})));
    },err=>{/* invites collection may not exist yet, ignore */});

    return()=>{unsub1();unsub2();unsub3();};
  },[user]);

  const activeSweepstakes=sweepstakes.filter(s=>!s.archived);
  const archivedSweepstakes=sweepstakes.filter(s=>s.archived);
  const liveSweeps=activeSweepstakes.filter(s=>s.status==="live");
  const totalPoints=liveSweeps.reduce((sum,s)=>sum+s.myPoints,0);
  const organising=activeSweepstakes.filter(s=>s.role==="organiser").length;
  const bestPosition=liveSweeps.reduce((best,s)=>s.position&&(!best||s.position<best)?s.position:best,null);
  const myStats=computeUserStats(user.uid,rawSweepstakes.filter(sw=>!sw.archived&&sw.status==="live"));

  async function acceptInvite(invite){
    const{db,doc,updateDoc}=window._fb;
    try{
      // Mark the email invite as accepted, then send them through the same
      // "pick your name" flow used by invite links, so they always claim a player slot.
      await updateDoc(doc(db,"invites",invite.id),{status:"accepted"});
      onJoinViaInvite(invite.sweepstakeId);
    }catch(e){setError(e.message);}
  }
  async function declineInvite(invite){
    const{db,doc,updateDoc}=window._fb;
    try{await updateDoc(doc(db,"invites",invite.id),{status:"declined"});}catch(e){setError(e.message);}
  }

  async function archiveSweepstake(id){
    const{db,doc,updateDoc}=window._fb;
    try{await updateDoc(doc(db,"sweepstakes",id),{archived:true});}catch(e){setError(e.message);}
  }
  async function unarchiveSweepstake(id){
    const{db,doc,updateDoc}=window._fb;
    try{await updateDoc(doc(db,"sweepstakes",id),{archived:false});}catch(e){setError(e.message);}
  }
  async function deleteSweepstake(id,name){
    if(!window.confirm(`Permanently delete "${name}"? This can't be undone.`))return;
    const{db,doc,deleteDoc}=window._fb;
    try{await deleteDoc(doc(db,"sweepstakes",id));}catch(e){setError(e.message);}
  }

  return(
    <div style={{minHeight:"100vh"}}>
      {/* Header */}
      <div style={{borderBottom:`1px solid ${C.pitchBorder}`,padding:"0 20px"}}>
        <div style={{maxWidth:900,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 0"}}>
          <div className="display" style={{fontSize:24,letterSpacing:0.5}}>
            SWEEP<span style={{color:C.amber}}>R</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={onGlobalLeaderboard} className="mono" style={{background:"transparent",border:`1px solid ${C.pitchBorder}`,color:C.chalkDim,borderRadius:6,padding:"6px 12px",fontSize:11,cursor:"pointer",letterSpacing:1}}>🌍 GLOBAL</button>
            {user.uid===ADMIN_UID&&(
              <button onClick={onManagePresets} className="mono" style={{background:"transparent",border:`1px solid ${C.amber}60`,color:C.amber,borderRadius:6,padding:"6px 12px",fontSize:11,cursor:"pointer",letterSpacing:1}}>⚙ PRESETS</button>
            )}
            <button onClick={()=>setShowNamePrompt(true)} title="Edit display name" style={{
              width:32,height:32,borderRadius:"50%",background:AMBER_GRADIENT,display:"flex",alignItems:"center",
              justifyContent:"center",fontWeight:800,color:C.pitch,fontSize:13,border:"none",cursor:"pointer"
            }}>
              {((myProfile&&myProfile.displayName)||user.email||"?")[0].toUpperCase()}
            </button>
            <button onClick={onLogout} className="mono" style={{background:"transparent",border:`1px solid ${C.pitchBorder}`,color:C.chalkDim,borderRadius:6,padding:"6px 12px",fontSize:11,cursor:"pointer",letterSpacing:1}}>LOG OUT</button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"28px 20px 60px"}}>

        {error&&(
          <div style={{background:"rgba(224,82,74,0.1)",border:`1px solid ${C.red}`,borderRadius:8,padding:"10px 14px",marginBottom:20,fontSize:12,color:C.red}} className="mono">
            ⚠ {error}
          </div>
        )}

        {/* Stats row */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:32}}>
          <StatBlock label="Active Sweepstakes" value={liveSweeps.length} suffix=""/>
          <StatBlock label="Total Points" value={totalPoints} suffix="PTS" accent/>
          <StatBlock label="Pts / Sweepstake" value={myStats.pointsPerSweepstake.toFixed(1)} suffix=""/>
          <StatBlock label="Pts / Team" value={myStats.pointsPerTeam.toFixed(1)} suffix=""/>
          <StatBlock label="Best Position" value={bestPosition?`#${bestPosition}`:"—"} suffix=""/>
          <StatBlock label="Organising" value={organising} suffix=""/>
        </div>

        {/* Invites */}
        {invites.length>0&&(
          <div style={{marginBottom:32}}>
            <SectionLabel>Invitations</SectionLabel>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {invites.map(inv=>(
                <InviteCard key={inv.id} invite={inv} onAccept={()=>acceptInvite(inv)} onDecline={()=>declineInvite(inv)}/>
              ))}
            </div>
          </div>
        )}

        {/* Sweepstakes list */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:14}}>
          <SectionLabel noMargin>Your Sweepstakes</SectionLabel>
          <button onClick={onCreateNew} style={{
            background:AMBER_GRADIENT,border:"none",color:C.pitch,borderRadius:8,
            padding:"10px 18px",fontWeight:800,fontSize:13,cursor:"pointer",
            boxShadow:"0 4px 14px rgba(232,185,35,0.2)",display:"flex",alignItems:"center",gap:6
          }}>
            <span style={{fontSize:16,lineHeight:1}}>+</span> New Sweepstake
          </button>
        </div>

        {loading?(
          <div style={{textAlign:"center",padding:"40px 0",color:C.chalkDim}} className="mono">Loading your sweepstakes...</div>
        ):activeSweepstakes.length===0?(
          <EmptyState onCreateNew={onCreateNew}/>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {activeSweepstakes.map(sw=>(
              <SweepstakeCard key={sw.id} sw={sw} onClick={()=>onOpenSweepstake(sw)}
                onArchive={sw.role==="organiser"?()=>archiveSweepstake(sw.id):null}
                onDelete={sw.role==="organiser"?()=>deleteSweepstake(sw.id,sw.name):null}/>
            ))}
          </div>
        )}

        {archivedSweepstakes.length>0&&(
          <div style={{marginTop:32}}>
            <div onClick={()=>setShowArchived(s=>!s)} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:8,marginBottom:showArchived?14:0}}>
              <SectionLabel noMargin>Archived ({archivedSweepstakes.length})</SectionLabel>
              <span className="mono" style={{fontSize:11,color:C.chalkDim}}>{showArchived?"▲ hide":"▼ show"}</span>
            </div>
            {showArchived&&(
              <div style={{display:"flex",flexDirection:"column",gap:14,opacity:0.7}}>
                {archivedSweepstakes.map(sw=>(
                  <SweepstakeCard key={sw.id} sw={sw} onClick={()=>onOpenSweepstake(sw)}
                    onUnarchive={sw.role==="organiser"?()=>unarchiveSweepstake(sw.id):null}
                    onDelete={sw.role==="organiser"?()=>deleteSweepstake(sw.id,sw.name):null}/>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
      {showNamePrompt&&(
        <DisplayNamePrompt user={user} onDone={()=>{
          setShowNamePrompt(false);
          const{db,doc,getDoc}=window._fb;
          getDoc(doc(db,"users",user.uid)).then(snap=>{if(snap.exists())setMyProfile(snap.data());}).catch(()=>{});
        }}/>
      )}
    </div>
  );
}

function StatBlock({label,value,suffix,accent}){
  return(
    <div style={{background:C.pitchLight,border:`1px solid ${C.pitchBorder}`,borderRadius:10,padding:"14px 16px"}}>
      <div className="mono" style={{fontSize:10,color:C.chalkDim,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>{label}</div>
      <div className="display" style={{fontSize:26,color:accent?C.amber:C.chalk}}>{value}{suffix&&<span style={{fontSize:12,marginLeft:4,color:C.chalkDim}}>{suffix}</span>}</div>
    </div>
  );
}

function SectionLabel({children,noMargin}){
  return(
    <div className="mono" style={{fontSize:11,color:C.chalkDim,letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:noMargin?0:14}}>
      {children}
    </div>
  );
}

function EmptyState({onCreateNew}){
  return(
    <div style={{textAlign:"center",padding:"60px 20px",border:`1px dashed ${C.pitchBorder}`,borderRadius:12}}>
      <div style={{fontSize:40,marginBottom:12}}>🎟️</div>
      <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>No sweepstakes yet</div>
      <div className="mono" style={{fontSize:12,color:C.chalkDim,marginBottom:18}}>Create one and invite your friends to join the draw</div>
      <button onClick={onCreateNew} style={{background:AMBER_GRADIENT,border:"none",color:C.pitch,borderRadius:8,padding:"11px 22px",fontWeight:800,fontSize:13,cursor:"pointer"}}>
        + Create Your First Sweepstake
      </button>
    </div>
  );
}

function teamCountHint(format){
  switch(format){
    case "league": return "typically all teams in the league (e.g. 20 for Premier League)";
    case "league_knockout": return "all teams in the competition's league phase";
    case "knockout": return "all teams entering the competition (e.g. 64 for FA Cup)";
    case "groups_knockout": return "all teams across all groups — group assignment comes next";
    default: return "all teams/competitors";
  }
}

// ── CREATE SWEEPSTAKE SCREEN ─────────────────────────────────

// ── GLOBAL LEADERBOARD ────────────────────────────────────────
const MIN_SWEEPSTAKES_TO_QUALIFY=2;

function GlobalLeaderboard({user,onBack}){
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState("");
  const[rows,setRows]=useState([]);
  const[profiles,setProfiles]=useState({}); // uid -> {displayName}
  const[search,setSearch]=useState("");
  const[showInfo,setShowInfo]=useState(false);

  useEffect(()=>{
    const{db,collection,getDocs}=window._fb;
    getDocs(collection(db,"sweepstakes")).then(async snap=>{
      const allSweepstakes=snap.docs.map(d=>({id:d.id,...d.data()})).filter(sw=>!sw.archived&&sw.status==="live");

      // Collect every distinct uid that's linked to a player name in any sweepstake
      const uids=new Set();
      allSweepstakes.forEach(sw=>{
        Object.values(sw.playerUserIds||{}).forEach(uid=>{if(uid)uids.add(uid);});
      });

      const computed=[...uids].map(uid=>{
        const stats=computeUserStats(uid,allSweepstakes);
        return{uid,...stats};
      }).filter(r=>r.sweepstakeCount>=MIN_SWEEPSTAKES_TO_QUALIFY);

      computed.sort((a,b)=>b.pointsPerTeam-a.pointsPerTeam);
      setRows(computed);

      // Fetch display-name profiles for everyone who qualified
      const{doc,getDoc}=window._fb;
      const profileMap={};
      await Promise.all(computed.map(async r=>{
        try{
          const pSnap=await getDoc(doc(db,"users",r.uid));
          if(pSnap.exists())profileMap[r.uid]=pSnap.data();
        }catch(e){}
      }));
      setProfiles(profileMap);
      setLoading(false);
    }).catch(e=>{setError(e.message);setLoading(false);});
  },[]);

  function displayName(uid){
    const p=profiles[uid];
    if(p&&p.displayName)return p.displayName;
    if(uid===user.uid)return "You";
    return `Player ${uid.slice(0,5)}`; // never shows email — privacy-safe fallback
  }

  const filtered=rows.filter(r=>!search||displayName(r.uid).toLowerCase().includes(search.toLowerCase()));
  const myRank=rows.findIndex(r=>r.uid===user.uid)+1;
  const myRow=rows.find(r=>r.uid===user.uid);

  return(
    <div style={{minHeight:"100vh"}}>
      <div style={{borderBottom:`1px solid ${C.pitchBorder}`,padding:"0 20px"}}>
        <div style={{maxWidth:700,margin:"0 auto",display:"flex",alignItems:"center",gap:14,padding:"18px 0"}}>
          <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.pitchBorder}`,color:C.chalkDim,borderRadius:6,width:34,height:34,cursor:"pointer",fontSize:16}}>←</button>
          <div className="display" style={{fontSize:20,flex:1}}>GLOBAL LEADERBOARD</div>
          <button onClick={()=>setShowInfo(true)} style={{background:"transparent",border:`1px solid ${C.pitchBorder}`,color:C.chalkDim,borderRadius:"50%",width:28,height:28,cursor:"pointer",fontSize:13,fontWeight:700}}>ⓘ</button>
        </div>
      </div>

      {/* Your rank — front and center, no scrolling needed */}
      <div style={{maxWidth:700,margin:"0 auto",padding:"24px 20px 0"}}>
        <div className="ticket" style={{textAlign:"center",padding:"24px 20px"}}>
          {!loading&&myRow?(
            <>
              <div className="display" style={{fontSize:48,color:C.amber,lineHeight:1}}>#{myRank}</div>
              <div className="mono" style={{fontSize:13,color:C.chalk,fontWeight:700,marginTop:6}}>{displayName(user.uid)}</div>
              <div className="mono" style={{fontSize:11,color:C.chalkDim,marginTop:4}}>{myRow.pointsPerTeam.toFixed(1)} pts/team · {myRow.sweepstakeCount} sweepstakes</div>
            </>
          ):!loading?(
            <div className="mono" style={{fontSize:12,color:C.chalkDim}}>
              You're not ranked yet — need {MIN_SWEEPSTAKES_TO_QUALIFY}+ active sweepstakes to qualify
            </div>
          ):(
            <div className="mono" style={{fontSize:12,color:C.chalkDim}}>Loading your rank...</div>
          )}
        </div>
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:"20px 20px 60px"}}>
        <div className="mono" style={{fontSize:11,color:C.chalkDim,marginBottom:16}}>
          Ranked by points-per-team — the fairest way to compare across different sweepstakes. Requires {MIN_SWEEPSTAKES_TO_QUALIFY}+ active sweepstakes to qualify. <span onClick={()=>setShowInfo(true)} style={{color:C.amber,cursor:"pointer",textDecoration:"underline"}}>How is this scored?</span>
        </div>

        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name..."
          style={{...fieldInput,marginBottom:20}}/>

        {error&&<div style={{color:C.red,fontSize:12,marginBottom:16,fontWeight:600}} className="mono">⚠ {error}</div>}

        {loading?(
          <div className="mono" style={{color:C.chalkDim,fontSize:12}}>Loading...</div>
        ):filtered.length===0?(
          <div className="mono" style={{color:C.chalkDim,fontSize:12}}>
            {rows.length===0?`No one qualifies yet — need ${MIN_SWEEPSTAKES_TO_QUALIFY}+ active sweepstakes each.`:"No matches."}
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {filtered.map((r,i)=>{
              const rank=rows.indexOf(r)+1;
              const isMe=r.uid===user.uid;
              return(
                <div key={r.uid} className="ticket" style={{
                  display:"flex",alignItems:"center",padding:"12px 16px",gap:12,
                  border:isMe?`1px solid ${C.amber}`:undefined
                }}>
                  <div className="display" style={{fontSize:18,color:rank<=3?C.amber:C.chalkDim,width:32}}>#{rank}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:14}}>{displayName(r.uid)}{isMe&&<span className="mono" style={{fontSize:10,color:C.amber,marginLeft:6}}>YOU</span>}</div>
                    <div className="mono" style={{fontSize:11,color:C.chalkDim}}>{r.sweepstakeCount} sweepstakes · {r.totalTeams} teams</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div className="display" style={{fontSize:18,color:C.amber}}>{r.pointsPerTeam.toFixed(1)}</div>
                    <div className="mono" style={{fontSize:9,color:C.chalkDim}}>PTS/TEAM</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {showInfo&&<ScoringInfoModal onClose={()=>setShowInfo(false)}/>}
    </div>
  );
}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>

        </div>
      </div>
    </div>
  );
}

function ManagePresets({user,onBack}){
  const[presets,setPresets]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState("");
  const[editing,setEditing]=useState(null); // null | "new" | preset object

  function loadPresets(){
    const{db,collection,getDocs}=window._fb;
    setLoading(true);
    getDocs(collection(db,"presets")).then(snap=>{
      setPresets(snap.docs.map(d=>({id:d.id,...d.data()})));
      setLoading(false);
    }).catch(e=>{setError(e.message);setLoading(false);});
  }

  useEffect(()=>{loadPresets();},[]);

  async function seedDefaults(){
    const{db,doc,setDoc}=window._fb;
    setError("");
    try{
      for(const p of SEED_PRESETS){
        await setDoc(doc(db,"presets",p.id),p);
      }
      loadPresets();
    }catch(e){setError(e.message);}
  }

  async function toggleArchive(p){
    const{db,doc,updateDoc}=window._fb;
    try{
      await updateDoc(doc(db,"presets",p.id),{archived:!p.archived});
      loadPresets();
    }catch(e){setError(e.message);}
  }

  async function deletePreset(p){
    if(!window.confirm(`Permanently delete preset "${p.name}"? Sweepstakes already created from it keep working — only the option to create new ones from it is removed.`))return;
    const{db,doc,deleteDoc}=window._fb;
    try{
      await deleteDoc(doc(db,"presets",p.id));
      loadPresets();
    }catch(e){setError(e.message);}
  }

  function clonePreset(p){
    // Open the editor pre-filled from p, but flagged as new so it saves as a separate preset
    setEditing({...p, _cloneFrom:p.name, id:undefined});
  }

  if(editing){
    return <PresetEditor preset={editing==="new"?null:editing} onSaved={()=>{setEditing(null);loadPresets();}} onCancel={()=>setEditing(null)}/>;
  }

  return(
    <div style={{minHeight:"100vh"}}>
      <div style={{borderBottom:`1px solid ${C.pitchBorder}`,padding:"0 20px"}}>
        <div style={{maxWidth:700,margin:"0 auto",display:"flex",alignItems:"center",gap:14,padding:"18px 0"}}>
          <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.pitchBorder}`,color:C.chalkDim,borderRadius:6,width:34,height:34,cursor:"pointer",fontSize:16}}>←</button>
          <div className="display" style={{fontSize:20}}>MANAGE PRESETS</div>
        </div>
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:"28px 20px 60px"}}>
        {error&&<div style={{color:C.red,fontSize:12,marginBottom:16,fontWeight:600}} className="mono">⚠ {error}</div>}

        <div style={{display:"flex",gap:10,marginBottom:24,flexWrap:"wrap"}}>
          <button onClick={()=>setEditing("new")} style={{background:AMBER_GRADIENT,border:"none",color:C.pitch,borderRadius:8,padding:"10px 18px",fontWeight:800,fontSize:13,cursor:"pointer"}}>
            + Add Preset
          </button>
          {presets.length===0&&!loading&&(
            <button onClick={seedDefaults} style={pillBtn}>↻ Seed Default Presets</button>
          )}
        </div>

        {loading?(

                </div>

                <button onClick={()=>toggleArchive(p)} style={{...pillBtn,padding:"6px 12px",fontSize:11}}>{p.archived?"Unarchive":"Archive"}</button>
                <button onClick={()=>deletePreset(p)} style={{...pillBtn,padding:"6px 12px",fontSize:11,color:C.red,borderColor:C.red}}>Delete</button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function PresetEditor({preset,onSaved,onCancel}){
  const isNew=!preset||!preset.id;
  const isClone=!!(preset&&preset._cloneFrom);
  const[id,setId]=useState(preset?.id||"");
  const[name,setName]=useState(isClone?`${preset.name} (Copy)`:(preset?.name||""));
  const[icon,setIcon]=useState(preset?.icon||"🏆");
  const[format,setFormat]=useState(preset?.format||"league");
  const[desc,setDesc]=useState(preset?.desc||"");
  const[teamsText,setTeamsText]=useState((preset?.teams||[]).join("\n"));
  const[fixturesText,setFixturesText]=useState(
    (preset?.fixtures||[]).map(f=>f.date?`${f.date} | ${f.home} vs ${f.away}`:`${f.home} vs ${f.away}`).join("\n")
  );
  const[saving,setSaving]=useState(false);
  const[error,setError]=useState("");

  function parseTeams(text){
    return text.split(/[\n\r\t,]+/).map(s=>s.trim()).filter(Boolean);
  }

  // Parses "Date | Team A vs Team B" or just "Team A vs Team B" (no date) per line
  function parseFixtures(text){
    const out=[];
    text.split("\n").forEach(line=>{
      line=line.trim();
      if(!line)return;
      let date=null,rest=line;
      const pipeIdx=line.indexOf("|");
      if(pipeIdx!==-1){
        date=line.slice(0,pipeIdx).trim();
        rest=line.slice(pipeIdx+1).trim();
      }
      const m=rest.match(/^(.+?)\s+(?:vs\.?|v\.)\s+(.+)$/i);
      if(m){
        out.push({date,home:m[1].trim(),away:m[2].trim()});
      }
    });
    return out;
  }

  async function handleSave(e){
    e.preventDefault();
    setError("");
    const teams=parseTeams(teamsText);
    const fixtures=parseFixtures(fixturesText);
    if(!name.trim()){setError("Name is required");return;}
    if(teams.length===0){setError("Add at least one team");return;}
    const docId=isNew?(id.trim()||name.trim().toLowerCase().replace(/[^a-z0-9]+/g,"_")):preset.id;

    setSaving(true);
    try{
      const{db,doc,setDoc}=window._fb;
      await setDoc(doc(db,"presets",docId),{
        name:name.trim(),
        icon:icon.trim()||"🏆",
        format,
        teams,
        fixtures,
        desc:desc.trim(),
        archived:preset?.archived||false,
      });
      onSaved();
    }catch(e){setError(e.message);}
    finally{setSaving(false);}
  }

  return(
    <div style={{minHeight:"100vh"}}>
      <div style={{borderBottom:`1px solid ${C.pitchBorder}`,padding:"0 20px"}}>
        <div style={{maxWidth:700,margin:"0 auto",display:"flex",alignItems:"center",gap:14,padding:"18px 0"}}>
          <button onClick={onCancel} style={{background:"transparent",border:`1px solid ${C.pitchBorder}`,color:C.chalkDim,borderRadius:6,width:34,height:34,cursor:"pointer",fontSize:16}}>←</button>
          <div className="display" style={{fontSize:20}}>{isClone?"CLONE PRESET":isNew?"NEW PRESET":"EDIT PRESET"}</div>
        </div>
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:"28px 20px 60px"}}>
        <form onSubmit={handleSave}>
          {isNew&&(
            <>
              <label style={fieldLabel}>Preset ID (used internally, no spaces)</label>
              {isClone&&<div className="mono" style={{fontSize:11,color:C.amber,marginBottom:6}}>Cloned from "{preset._cloneFrom}" — give this a new ID and update the details below</div>}
              <input value={id} onChange={e=>setId(e.target.value)} placeholder="e.g. pl_2027_28" style={fieldInput}/>
            </>
          )}

          <label style={{...fieldLabel,marginTop:14}}>Name</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Premier League 2027/28" style={fieldInput}/>

          <label style={{...fieldLabel,marginTop:14}}>Icon (emoji)</label>
          <input value={icon} onChange={e=>setIcon(e.target.value)} style={{...fieldInput,maxWidth:80}}/>

          <label style={{...fieldLabel,marginTop:14}}>Format</label>
          <select value={format} onChange={e=>setFormat(e.target.value)} style={fieldInput}>
            {FORMATS.map(f=><option key={f.id} value={f.id}>{f.label}</option>)}
          </select>

          <label style={{...fieldLabel,marginTop:14}}>Description</label>
          <input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Short description shown to organisers" style={fieldInput}/>

          <label style={{...fieldLabel,marginTop:14}}>Teams</label>
          <div className="mono" style={{fontSize:11,color:C.chalkDim,marginBottom:6}}>One per line, or paste a column from Excel/Sheets</div>
          <textarea value={teamsText} onChange={e=>setTeamsText(e.target.value)} rows={8}
            style={{...fieldInput,resize:"vertical",fontFamily:"'Space Mono',monospace",fontSize:13}}/>
          {teamsText.trim()&&<div className="mono" style={{fontSize:11,color:C.amber,marginTop:6}}>{parseTeams(teamsText).length} teams</div>}

          <label style={{...fieldLabel,marginTop:14}}>Fixtures (optional)</label>
          <div className="mono" style={{fontSize:11,color:C.chalkDim,marginBottom:6}}>
            One per line: <code style={{background:C.pitch,padding:"1px 5px",borderRadius:3}}>Date | TeamA vs TeamB</code> or just <code style={{background:C.pitch,padding:"1px 5px",borderRadius:3}}>TeamA vs TeamB</code> with no date
          </div>
          <textarea value={fixturesText} onChange={e=>setFixturesText(e.target.value)} rows={10}
            placeholder={"Friday 21 August 2026 | Arsenal vs Coventry City\nSaturday 22 August | Hull City vs Manchester United\n..."}
            style={{...fieldInput,resize:"vertical",fontFamily:"'Space Mono',monospace",fontSize:12}}/>
          {fixturesText.trim()&&<div className="mono" style={{fontSize:11,color:C.amber,marginTop:6}}>{parseFixtures(fixturesText).length} fixtures</div>}

          {error&&<div style={{color:C.red,fontSize:12,marginTop:10,fontWeight:600}}>{error}</div>}

          <button type="submit" disabled={saving} style={{
            width:"100%",marginTop:24,padding:"14px 0",borderRadius:8,border:"none",
            background:AMBER_GRADIENT,color:C.pitch,fontWeight:800,fontSize:14,letterSpacing:0.5,
            cursor:saving?"default":"pointer",opacity:saving?0.7:1
          }}>
            {saving?"Saving...":isNew?"Create Preset":"Save Changes"}
          </button>
        </form>
      </div>
    </div>
  );
}

function CreateSweepstake({user,onBack,onCreated}){
  const[step,setStep]=useState("choose"); // choose | format | details | preset_details
  const[preset,setPreset]=useState(null);
  const[format,setFormat]=useState(null);
  const[presets,setPresets]=useState([]);
  const[presetsLoading,setPresetsLoading]=useState(true);
  const[name,setName]=useState("");
  const[tournamentName,setTournamentName]=useState("");
  const[playersText,setPlayersText]=useState("");
  const[teamsText,setTeamsText]=useState("");
  const[groupsText,setGroupsText]=useState("");
  const[drawStyle,setDrawStyle]=useState("fixed"); // "fixed" | "random"
  const[leaguePhaseType,setLeaguePhaseType]=useState("round_robin"); // "round_robin" | "swiss"
  const[swissFixturesText,setSwissFixturesText]=useState("");
  const[directQualifiers,setDirectQualifiers]=useState(8);
  const[playoffSpots,setPlayoffSpots]=useState(16);
  const[error,setError]=useState("");
  const[saving,setSaving]=useState(false);

  // Parses pasted text: handles one-per-line, comma-separated, or tab-separated
  // (Excel/Sheets columns paste as newline or tab separated automatically)
  function parseList(text){
    return text
      .split(/[\n\r\t,]+/)
      .map(s=>s.trim())
      .filter(Boolean);
  }

  // Parses "A: Team1, Team2, Team3, Team4" lines into {A:[...],B:[...]}
  function parseGroups(text){
    const groups={};
    text.split("\n").forEach(line=>{
      const idx=line.indexOf(":");
      if(idx===-1)return;
      const key=line.slice(0,idx).trim();
      const teams=line.slice(idx+1).split(",").map(t=>t.trim()).filter(Boolean);
      if(key&&teams.length)groups[key]=teams;
    });
    return groups;
  }

  // Parses Swiss-style fixture input. Supports two line formats, mixed freely:
  //   "TeamA vs TeamB" / "TeamA v TeamB"                     (one fixture)
  //   "TeamA: Opponent1, Opponent2, Opponent3..."             (per-team opponent list)
  // Returns a deduplicated list of {home,away} pairs (home/away order as written).
  function parseSwissFixtures(text){
    const pairs=[];
    const seen=new Set();
    function addPair(a,b){
      const key=[a,b].sort().join("__");
      if(seen.has(key))return;
      seen.add(key);
      pairs.push({home:a,away:b});
    }
    text.split("\n").forEach(line=>{
      line=line.trim();
      if(!line)return;
      // Per-team opponent list: "Team: Opp1, Opp2, ..."
      const colonIdx=line.indexOf(":");
      if(colonIdx!==-1){
        const team=line.slice(0,colonIdx).trim();
        const opponents=line.slice(colonIdx+1).split(",").map(t=>t.trim()).filter(Boolean);
        opponents.forEach(opp=>addPair(team,opp));
        return;
      }
      // Single fixture: "A vs B" / "A v B" / "A vs. B" (avoids splitting on hyphens inside team names)
      const m=line.match(/^(.+?)\s+(?:vs\.?|v\.)\s+(.+)$/i);
      if(m){
        addPair(m[1].trim(),m[2].trim());
        return;
      }
      // Fallback: " v " as a whole word only (not part of a hyphenated name)
      const m2=line.match(/^(.+?)\s+v\s+(.+)$/);
      if(m2){
        addPair(m2[1].trim(),m2[2].trim());
      }
    });
    return pairs;
  }

  useEffect(()=>{
    const{db,collection,getDocs}=window._fb;
    getDocs(collection(db,"presets")).then(snap=>{
      const list=snap.docs.map(d=>({id:d.id,...d.data()})).filter(p=>!p.archived);
      setPresets(list);
      setPresetsLoading(false);
    }).catch(()=>setPresetsLoading(false));
  },[]);

  function selectFormat(f){
    setPreset(null);
    setFormat(f);
    setStep("details");
  }

  function selectPreset(p){
    setPreset(p);
    setFormat(p.format);
    setName(p.name);
    setTournamentName(p.name);
    setTeamsText(p.teams.join("\n"));
    setStep("details");
  }

  async function handleCreate(e){
    e.preventDefault();
    setError("");
    const players=parseList(playersText);
    const isGroups=format==="groups_knockout";
    const groups=isGroups?parseGroups(groupsText):null;
    const teams=isGroups?Object.values(groups||{}).flat():parseList(teamsText);

    if(!name.trim()){setError("Give your sweepstake a name");return;}
    if(players.length<2){setError("Add at least 2 players");return;}
    if(isGroups){
      if(!groups||Object.keys(groups).length===0){setError("Add at least one group (e.g. A: Team1, Team2, Team3, Team4)");return;}
      const sizes=new Set(Object.values(groups).map(g=>g.length));
      if(sizes.size>1){setError("All groups should have the same number of teams");return;}
    }
    if(teams.length<players.length){setError(`Add at least ${players.length} teams (one per player minimum)`);return;}
    let swissFixtures=null;
    if(format==="league_knockout"){
      if(directQualifiers+playoffSpots>teams.length){setError(`Direct (${directQualifiers}) + Playoff (${playoffSpots}) can't exceed total teams (${teams.length})`);return;}
      if(directQualifiers<2){setError("At least 2 teams must qualify directly");return;}
      if(leaguePhaseType==="swiss"){
        swissFixtures=parseSwissFixtures(swissFixturesText);
        if(swissFixtures.length===0){setError("Add the Swiss-stage fixture list (e.g. \"Arsenal vs Inter\" or \"Arsenal: Inter, PSG, ...\")");return;}
        // Verify every fixture's teams are in the team list
        const teamSet=new Set(teams);
        const unknown=new Set();
        swissFixtures.forEach(({home,away})=>{
          if(!teamSet.has(home))unknown.add(home);
          if(!teamSet.has(away))unknown.add(away);
        });
        if(unknown.size>0){setError(`These teams in the fixture list aren't in your Teams list: ${[...unknown].join(", ")}`);return;}
      }
    }

    setSaving(true);
    try{
      const{db,collection,addDoc,serverTimestamp}=window._fb;
      const playerUserIds={};
      players.forEach(p=>{playerUserIds[p]=null;});
      const docRef=await addDoc(collection(db,"sweepstakes"),{
        name:name.trim(),
        tournamentName:tournamentName.trim()||FORMATS.find(f=>f.id===format)?.examples||"Custom",
        format,
        source:preset?"preset":"custom",
        presetId:preset?preset.id:null,
        status:"setup",
        ownerId:user.uid,
        memberIds:[user.uid],
        players,
        playerUserIds,
        assignments:{},
        teams,
        groups:groups||null,
        drawStyle:(format==="knockout"||format==="league_knockout")?drawStyle:null,
        leaguePhaseType:format==="league_knockout"?leaguePhaseType:null,
        swissFixtures:swissFixtures,
        presetFixtures:(preset&&preset.fixtures)?preset.fixtures:null, // already stored as {date,home,away} objects
        directQualifiers:format==="league_knockout"?directQualifiers:null,
        playoffSpots:format==="league_knockout"?playoffSpots:null,
        matches:{},
        standings:{},
        knockout:null,
        scoring:DEFAULT_SCORING,
        createdAt:serverTimestamp(),
      });
      onCreated(docRef.id);
    }catch(e){
      setError(e.message);
    }finally{setSaving(false);}
  }

  return(
    <div style={{minHeight:"100vh"}}>
      <div style={{borderBottom:`1px solid ${C.pitchBorder}`,padding:"0 20px"}}>
        <div style={{maxWidth:700,margin:"0 auto",display:"flex",alignItems:"center",gap:14,padding:"18px 0"}}>
          <button onClick={()=>{
            if(step==="details")setStep(preset?"choose":"format");
            else if(step==="format")setStep("choose");
            else onBack();
          }} style={{background:"transparent",border:`1px solid ${C.pitchBorder}`,color:C.chalkDim,borderRadius:6,width:34,height:34,cursor:"pointer",fontSize:16}}>←</button>
          <div className="display" style={{fontSize:20}}>NEW SWEEPSTAKE</div>
        </div>
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:"28px 20px 60px"}}>

        {step==="choose"&&(
          <div className="fade-up">
            <SectionLabel>Pre-loaded Tournaments</SectionLabel>
            {presetsLoading?(
              <div className="mono" style={{fontSize:12,color:C.chalkDim,marginBottom:20}}>Loading presets...</div>
            ):presets.length===0?(
              <div className="mono" style={{fontSize:12,color:C.chalkDim,marginBottom:20}}>No presets available yet — use Custom below</div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:28}}>
                {presets.map(p=>(
                <div key={p.id} onClick={()=>selectPreset(p)} style={{
                  background:C.pitchLight,border:`1px solid ${C.amber}50`,borderRadius:10,
                  padding:"16px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,
                  transition:"border-color .15s"
                }}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=C.amber}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=`${C.amber}50`}>
                  <div style={{fontSize:28}}>{p.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>{p.name}</div>
                    <div className="mono" style={{fontSize:12,color:C.chalkDim}}>{p.desc}</div>
                    <div className="mono" style={{fontSize:11,color:C.amber,marginTop:4}}>{p.teams.length} teams pre-loaded · real fixtures</div>
                  </div>
                  <div style={{fontSize:18,color:C.chalkDim}}>→</div>
                </div>
              ))}
              </div>
            )}

            <SectionLabel>Or Build Custom</SectionLabel>
            <div onClick={()=>setStep("format")} style={{
              background:C.pitchLight,border:`1px dashed ${C.pitchBorder}`,borderRadius:10,
              padding:"16px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:14
            }}>
              <div style={{fontSize:28}}>🛠️</div>

// ── SWEEPSTAKE VIEW HELPERS ──────────────────────────────────
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// Round-robin fixture generator for a league (each team plays every other team home & away)
function generateLeagueFixtures(teams){
  const fixtures=[];
  for(let i=0;i<teams.length;i++){
    for(let j=0;j<teams.length;j++){
      if(i===j)continue;
      fixtures.push({id:`${teams[i]}__${teams[j]}`,home:teams[i],away:teams[j],homeScore:"",awayScore:"",played:false});
    }
  }
  return fixtures;
}

function initLeagueStandings(teams){
  return teams.map(t=>({team:t,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}));
}

function recalcLeagueStandings(teams,fixtures){
  const standings=initLeagueStandings(teams);
  fixtures.forEach(m=>{
    if(!m.played)return;
    const hs=parseInt(m.homeScore)||0,as=parseInt(m.awayScore)||0;
    const home=standings.find(x=>x.team===m.home),away=standings.find(x=>x.team===m.away);
    if(!home||!away)return;
    home.p++;away.p++;home.gf+=hs;home.ga+=as;away.gf+=as;away.ga+=hs;
    if(hs>as){home.w++;home.pts+=3;away.l++;}
    else if(hs<as){away.w++;away.pts+=3;home.l++;}
    else{home.d++;home.pts++;away.d++;away.pts++;}
  });
  standings.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
  return standings;
}

// ── GROUP STAGE HELPERS (groups_knockout) ────────────────────
function initGroupStandings(groups){
  const standings={};
  Object.entries(groups).forEach(([g,teams])=>{
    standings[g]=teams.map(t=>({team:t,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}));
  });
  return standings;
}

// Generates the standard 6-match group (each pair plays once)
function generateGroupMatches(groups){
  const matches={};
  Object.entries(groups).forEach(([g,teams])=>{
    if(teams.length===4){
      matches[g]=[
        {id:`${g}1`,home:teams[0],away:teams[1],homeScore:"",awayScore:"",played:false},
        {id:`${g}2`,home:teams[2],away:teams[3],homeScore:"",awayScore:"",played:false},
        {id:`${g}3`,home:teams[0],away:teams[2],homeScore:"",awayScore:"",played:false},
        {id:`${g}4`,home:teams[1],away:teams[3],homeScore:"",awayScore:"",played:false},
        {id:`${g}5`,home:teams[0],away:teams[3],homeScore:"",awayScore:"",played:false},
        {id:`${g}6`,home:teams[1],away:teams[2],homeScore:"",awayScore:"",played:false},
      ];
    }else{
      // Generic round-robin for non-4 group sizes
      const fixtures=[];
      for(let i=0;i<teams.length;i++){
        for(let j=i+1;j<teams.length;j++){
          fixtures.push({id:`${g}_${i}_${j}`,home:teams[i],away:teams[j],homeScore:"",awayScore:"",played:false});
        }
      }
      matches[g]=fixtures;
    }
  });
  return matches;
}

function recalcGroupStandings(groups,matches){
  const standings=initGroupStandings(groups);
  Object.entries(matches).forEach(([g,gMatches])=>{
    (gMatches||[]).forEach(m=>{
      if(!m.played)return;
      const hs=parseInt(m.homeScore)||0,as=parseInt(m.awayScore)||0;
      const home=standings[g]?.find(x=>x.team===m.home),away=standings[g]?.find(x=>x.team===m.away);
      if(!home||!away)return;
      home.p++;away.p++;home.gf+=hs;home.ga+=as;away.gf+=as;away.ga+=hs;
      if(hs>as){home.w++;home.pts+=3;away.l++;}
      else if(hs<as){away.w++;away.pts+=3;home.l++;}
      else{home.d++;home.pts++;away.d++;away.pts++;}
    });
    if(standings[g])standings[g].sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
  });
  return standings;
}

// ── KNOCKOUT HELPERS ──────────────────────────────────────────
// Build a knockout bracket sized to the number of qualifiers (must be a power of 2)
function buildKnockoutBracket(qualifiers){
  // Pad to next power of 2 with "BYE" if needed (teams with a BYE auto-advance)
  let size=1;
  while(size<qualifiers.length)size*=2;
  const padded=[...qualifiers];
  while(padded.length<size)padded.push("BYE");

  const roundNames=[];
  let s=size;
  while(s>1){roundNames.push(s);s/=2;}
  const idToLabel={32:"r32",16:"r16",8:"qf",4:"sf",2:"final"};
  const rounds={};
  roundNames.forEach((roundSize,i)=>{
    const label=idToLabel[roundSize]||`round_${roundSize}`;
    if(i===0){
      const matches=[];
      for(let j=0;j<roundSize;j+=2){
        const home=padded[j]||"TBD",away=padded[j+1]||"TBD";
        // Auto-resolve byes
        let winner=null;
        if(home==="BYE"&&away!=="BYE")winner=away;
        else if(away==="BYE"&&home!=="BYE")winner=home;
        matches.push({home,away,homeScore:"",awayScore:"",winner});
      }
      rounds[label]=matches;
    }else{
      const matches=Array(roundSize/2).fill(null).map(()=>({home:"TBD",away:"TBD",homeScore:"",awayScore:"",winner:null}));
      rounds[label]=matches;
    }
  });
  rounds.roundOrder=roundNames.map(roundSize=>idToLabel[roundSize]||`round_${roundSize}`);

  // Propagate any auto-resolved byes into the next round
  rounds.roundOrder.forEach((label,ri)=>{
    if(ri===rounds.roundOrder.length-1)return;
    const nextLabel=rounds.roundOrder[ri+1];
    rounds[label].forEach((m,idx)=>{
      if(m.winner){
        const nextIdx=Math.floor(idx/2);
        const slot=idx%2===0?"home":"away";
        rounds[nextLabel][nextIdx][slot]=m.winner;
      }
    });
  });

  rounds.champion=null;
  return rounds;
}

// Build qualifiers list from group standings: top 2 from each group + best 3rd-placed
// to make the total a power of 2
function buildQualifiers(groups,standings){
  const groupKeys=Object.keys(groups).sort();
  const firsts=[],seconds=[],thirds=[];
  groupKeys.forEach(g=>{
    const rows=standings[g]||[];
    if(rows[0])firsts.push({team:rows[0].team,group:g});
    if(rows[1])seconds.push({team:rows[1].team,group:g});
    if(rows[2])thirds.push({...rows[2],group:g});
  });
  const direct=[...firsts,...seconds].map(x=>x.team);
  const directCount=direct.length;

  // Find next power of 2 >= directCount
  let target=2;
  while(target<directCount)target*=2;

  const needed=target-directCount;
  if(needed<=0||thirds.length===0){
    return direct;
  }
  thirds.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
  const bestThirds=thirds.slice(0,needed).map(x=>x.team);
  return[...direct,...bestThirds];
}

// ── DRAW / ASSIGNMENT SCREEN ──────────────────────────────────
function DrawScreen({sw,onSave,saving}){
  const{players=[],teams=[]}=sw;
  const[assignments,setAssignments]=useState(sw.assignments||{});
  const[drawMode,setDrawMode]=useState("even"); // "even" | "one_each"

  const evenPerPlayer=Math.floor(teams.length/players.length);
  const teamsPerPlayer=drawMode==="one_each"?1:evenPerPlayer;
  const teamsInPlay=teamsPerPlayer*players.length;
  const sittingOutCount=teams.length-teamsInPlay;

  function randomDraw(){
    const shuffled=shuffle(teams);
    const next={};
    shuffled.forEach((t,i)=>{
      const pi=i<teamsInPlay?i%players.length:-1;
      if(pi>=0)next[t]=players[pi];
    });
    setAssignments(next);
  }

  function assignTeam(team,playerName){
    setAssignments(prev=>{
      const next={...prev};
      if(playerName==="")delete next[team];
      else next[team]=playerName;
      return next;
    });
  }

  function clearAll(){setAssignments({});}

  const ready=Object.keys(assignments).length>0;
  const assignedTeams=teams.filter(t=>assignments[t]);
  const sittingOutTeams=teams.filter(t=>!assignments[t]);

  return(
    <div className="fade-up">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:14,flexWrap:"wrap",gap:10}}>
        <SectionLabel noMargin>The Draw</SectionLabel>
        <div className="mono" style={{fontSize:11,color:C.chalkDim}}>
          {teams.length} teams · {players.length} players
        </div>
      </div>

      <div style={{marginBottom:16}}>
        <div className="mono" style={{fontSize:11,color:C.chalkDim,marginBottom:6,letterSpacing:1,textTransform:"uppercase"}}>Draw Mode</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <div onClick={()=>setDrawMode("even")} style={{
            flex:"1 1 200px",cursor:"pointer",borderRadius:8,padding:"12px 14px",
            border:`1px solid ${drawMode==="even"?C.amber:C.pitchBorder}`,
            background:drawMode==="even"?"rgba(232,185,35,0.08)":C.pitchLight,
          }}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:3,color:drawMode==="even"?C.amber:C.chalk}}>Distribute Evenly</div>
            <div className="mono" style={{fontSize:11,color:C.chalkDim}}>
              {evenPerPlayer>0?`${evenPerPlayer} team${evenPerPlayer===1?"":"s"} per player`:"Not enough teams for every player"}
              {teams.length%players.length!==0&&evenPerPlayer>0&&` · ${teams.length%players.length} sitting out`}
            </div>
          </div>
          <div onClick={()=>setDrawMode("one_each")} style={{
            flex:"1 1 200px",cursor:"pointer",borderRadius:8,padding:"12px 14px",
            border:`1px solid ${drawMode==="one_each"?C.amber:C.pitchBorder}`,
            background:drawMode==="one_each"?"rgba(232,185,35,0.08)":C.pitchLight,
          }}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:3,color:drawMode==="one_each"?C.amber:C.chalk}}>One Team Per Player</div>
            <div className="mono" style={{fontSize:11,color:C.chalkDim}}>
              {players.length} team{players.length===1?"":"s"} in play
              {teams.length>players.length&&` · ${teams.length-players.length} sitting out`}
            </div>
          </div>
        </div>
      </div>

      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
        <button onClick={randomDraw} style={{...pillBtn,background:AMBER_GRADIENT,color:C.pitch}}>🎲 Random Draw</button>
        <button onClick={clearAll} style={pillBtn}>Clear</button>
        {ready&&(
          <button onClick={()=>onSave(assignments)} disabled={saving} style={{...pillBtn,background:"#2ecc71",color:"#06140c",opacity:saving?0.6:1}}>
            {saving?"Saving...":"✓ Confirm Draw & Start"}
          </button>
        )}
      </div>

      {sittingOutCount>0&&drawMode&&(
        <div className="mono" style={{fontSize:11,color:C.chalkDim,marginBottom:16,padding:"8px 12px",background:C.pitchLight,borderRadius:6,border:`1px solid ${C.pitchBorder}`}}>
          ℹ️ {sittingOutCount} team{sittingOutCount===1?"":"s"} will sit out unallocated — still tracked in the table/bracket, just not owned by anyone
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
        {teams.map(team=>{
          const assigned=assignments[team]||"";
          return(
            <div key={team} className="ticket" style={{display:"flex",alignItems:"center",padding:"12px 16px",gap:10}}>
              <div style={{flex:1,fontWeight:600,fontSize:14}}>{team}</div>
              <select value={assigned} onChange={e=>assignTeam(team,e.target.value)} style={{
                background:assigned?C.amber:C.pitch,color:assigned?C.pitch:C.chalkDim,
                border:`1px solid ${C.pitchBorder}`,borderRadius:6,padding:"6px 10px",fontSize:12,fontWeight:700,cursor:"pointer"
              }}>
                <option value="">— Sitting Out</option>
                {players.map(p=><option key={p} value={p}>{p}</option>)}
              </select>
            </div>
          );
        })}
      </div>
    </div>
  );
}

    const next=fixtures.map(f=>f.played?f:{
      ...f,
      homeScore:String(Math.floor(Math.random()*5)),
      awayScore:String(Math.floor(Math.random()*5)),
      played:true,
    });
    await onUpdate({fixtures:next});

    const idx=players.indexOf(name);

          <SectionLabel>{filter?`Results — ${filter}`:"Results"}</SectionLabel>
          <div style={{background:C.pitchLight,border:`1px solid ${C.pitchBorder}`,borderRadius:10,overflow:"hidden"}}>
            {(filter?played.slice().reverse():played.slice().reverse().slice(0,UNFILTERED_CAP)).map(fx=>(

            ))}
          </div>
          {!filter&&played.length>UNFILTERED_CAP&&<div className="mono" style={{padding:"10px",color:C.chalkDim,fontSize:11,textAlign:"center"}}>+ {played.length-UNFILTERED_CAP} more — search above to find a specific result</div>}
        </>
      )}
    </div>
  );
}

// ── GROUPS VIEW (groups_knockout) ────────────────────────────
function GroupsView({sw,onUpdate,onBuildKnockout}){
  const{groups={},assignments={},players=[]}=sw;
  const matches=sw.matches&&Object.keys(sw.matches).length?sw.matches:generateGroupMatches(groups);
  const standings=recalcGroupStandings(groups,matches);

  function playerColor(name){
    const idx=players.indexOf(name);
    const palette=["#e8b923","#5fb3e8","#e85f5f","#5fe88a","#c25fe8","#e88a5f"];
    return palette[idx%palette.length];
  }

  async function updateScore(g,mi,field,value){
    const next={...matches,[g]:matches[g].map((m,i)=>i===mi?{...m,[field]:value}:m)};
    await onUpdate({matches:next});
  }
  async function confirmMatch(g,mi){
    const m=matches[g][mi];
    if(m.homeScore===""||m.awayScore==="")return;
    const next={...matches,[g]:matches[g].map((mm,i)=>i===mi?{...mm,played:true}:mm)};
    await onUpdate({matches:next});
  }
  async function unconfirmMatch(g,mi){
    const next={...matches,[g]:matches[g].map((mm,i)=>i===mi?{...mm,played:false}:mm)};
    await onUpdate({matches:next});
  }

  const allPlayed=Object.values(matches).every(gm=>gm.every(m=>m.played));

  async function fillAllRandom(){
    const next={};
    Object.entries(matches).forEach(([g,gm])=>{
      next[g]=gm.map(m=>m.played?m:{
        ...m,
        homeScore:String(Math.floor(Math.random()*5)),
        awayScore:String(Math.floor(Math.random()*5)),
        played:true,
      });
    });
    await onUpdate({matches:next});
  }

  return(
    <div className="fade-up">
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
        {!sw.knockout&&(
          <button onClick={onBuildKnockout} style={{...pillBtn,background:AMBER_GRADIENT,color:C.pitch,opacity:allPlayed?1:0.6}}>
            🏆 Build Knockout Bracket {allPlayed?"":"(finish all group matches first)"}
          </button>
        )}
        {!allPlayed&&(
          <button onClick={fillAllRandom} style={{...pillBtn,border:`1px dashed ${C.chalkDim}`,color:C.chalkDim}}>
            🎲 Fill All Remaining (Test)
          </button>
        )}
      </div>
      {Object.entries(groups).sort(([a],[b])=>a.localeCompare(b)).map(([g,teams])=>(
        <div key={g} style={{marginBottom:28}}>
          <SectionLabel>Group {g}</SectionLabel>
          <div className="group-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            {/* Standings */}
            <div style={{background:C.pitchLight,border:`1px solid ${C.pitchBorder}`,borderRadius:10,overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{background:C.pitch,color:C.chalkDim}} className="mono">
                    <th style={{padding:"7px 10px",textAlign:"left"}}>Team</th>
                    <th style={thStyle}>P</th><th style={thStyle}>W</th><th style={thStyle}>D</th><th style={thStyle}>L</th>
                    <th style={thStyle}>GD</th><th style={thStyle}>Pts</th>
                  </tr>
                </thead>
                <tbody>
                  {(standings[g]||[]).map((row,ri)=>{
                    const owner=assignments[row.team];
                    return(
                      <tr key={row.team} style={{borderBottom:`1px solid ${C.pitch}`,background:ri<2?"rgba(232,185,35,0.06)":"transparent"}}>
                        <td style={{padding:"7px 10px"}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            {ri<2&&<span style={{color:"#2ecc71",fontSize:9}}>✦</span>}
                            <span style={{fontWeight:600}}>{row.team}</span>
                            {owner&&<span className="mono" style={{fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:4,background:playerColor(owner),color:"#06140c"}}>{owner}</span>}
                          </div>
                        </td>
                        <td style={tdStyle}>{row.p}</td><td style={tdStyle}>{row.w}</td><td style={tdStyle}>{row.d}</td><td style={tdStyle}>{row.l}</td>
                        <td style={tdStyle}>{row.gf-row.ga}</td>
                        <td style={{...tdStyle,fontWeight:800,color:C.chalk}}>{row.pts}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {/* Fixtures */}
            <div style={{background:C.pitchLight,border:`1px solid ${C.pitchBorder}`,borderRadius:10,overflow:"hidden"}}>
              {(matches[g]||[]).map((m,mi)=>(
                <div key={m.id} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 10px",borderBottom:`1px solid ${C.pitch}`}}>
                  <span style={{flex:1,textAlign:"right",fontSize:12,fontWeight:m.played?700:500,color:m.played?C.chalk:C.chalkDim,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.home}</span>
                  <input value={m.homeScore} onChange={e=>updateScore(g,mi,"homeScore",e.target.value)} disabled={m.played}
                    style={{...miniScoreInput,background:m.played?C.pitch:"#06140c"}}/>
                  <span className="mono" style={{color:C.chalkDim,fontSize:11}}>:</span>
                  <input value={m.awayScore} onChange={e=>updateScore(g,mi,"awayScore",e.target.value)} disabled={m.played}
                    style={{...miniScoreInput,background:m.played?C.pitch:"#06140c"}}/>
                  <span style={{flex:1,fontSize:12,fontWeight:m.played?700:500,color:m.played?C.chalk:C.chalkDim,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.away}</span>
                  {m.played
                    ?<button onClick={()=>unconfirmMatch(g,mi)} style={miniIconBtn}>✎</button>
                    :<button onClick={()=>confirmMatch(g,mi)} style={{...miniIconBtn,color:"#2ecc71"}}>✓</button>
                  }
                </div>
              ))}
            </div>
          </div>
        </div>
      ))}
      <style>{`@media(max-width:600px){.group-grid{grid-template-columns:1fr !important;}}`}</style>
    </div>
  );
}

// ── KNOCKOUT VIEW ─────────────────────────────────────────────
const ROUND_LABELS={playoff:"Playoff Round",r32:"Round of 32",r16:"Round of 16",qf:"Quarter Finals",sf:"Semi Finals",final:"🏆 Final"};

function KnockoutView({sw,onUpdate}){
  const{knockout,assignments={},players=[],drawStyle="fixed"}=sw;
  if(!knockout)return null;
  const rounds=knockout.roundOrder||["r32","r16","qf","sf","final"];

  function playerColor(name){
    const idx=players.indexOf(name);
    const palette=["#e8b923","#5fb3e8","#e85f5f","#5fe88a","#c25fe8","#e88a5f"];
    return palette[idx%palette.length];
  }

  // Winners from a completed round, available to be placed into the next round (random draw mode)
  // Returns the list of teams available for a TBD slot.
  // - For the "playoff" round: teams come from the seeded/unseeded pots assigned at bracket creation
  // - For all other rounds: teams come from the previous round's winners
  function availableTeams(round,pot){
    if(round==="playoff"){
      const pool=(knockout.playoffPots&&knockout.playoffPots[pot])||[];
      const placed=(knockout.playoff||[]).flatMap(m=>[m.home,m.away]).filter(t=>t!=="TBD");
      return pool.filter(t=>!placed.includes(t));
    }
    const ri=rounds.indexOf(round);
    if(ri<=0)return[];
    const prevRound=rounds[ri-1];
    const allWinners=(knockout[prevRound]||[]).map(m=>m.winner).filter(Boolean);
    const placed=(knockout[round]||[]).flatMap(m=>[m.home,m.away]).filter(t=>t!=="TBD");
    return allWinners.filter(w=>!placed.includes(w));
  }
  // Kept for backward compatibility with non-pot rounds
  function availableWinners(round){
    return availableTeams(round,null);
  }

  function prevRoundComplete(round){
    if(round==="playoff")return true; // playoff teams come from pots, always available to fill
    const ri=rounds.indexOf(round);
    if(ri<=0)return true;
    const prevRound=rounds[ri-1];
    if(prevRound==="playoff"){
      // R16 dropdowns can start filling as soon as at least one playoff tie has a winner
      return(knockout[prevRound]||[]).some(m=>!!m.winner);
    }
    return(knockout[prevRound]||[]).every(m=>!!m.winner);
  }

  async function updateScore(round,idx,field,value){
    const next={...knockout,[round]:knockout[round].map((m,i)=>i===idx?{...m,[field]:value}:m)};
    await onUpdate({knockout:next});
  }
  async function confirmMatch(round,idx){
    const m=knockout[round][idx];
    if(m.homeScore===""||m.awayScore==="")return;
    const hs=parseInt(m.homeScore),as=parseInt(m.awayScore);
    const winner=hs>=as?m.home:m.away;
    const next={...knockout,[round]:knockout[round].map((mm,i)=>i===idx?{...mm,winner}:mm)};
    const ri=rounds.indexOf(round);
    if(round!=="playoff"&&ri>=0&&ri<rounds.length-1&&drawStyle==="fixed"){
      // Fixed bracket: auto-propagate to the positionally-corresponding next slot
      const nextRound=rounds[ri+1];
      const nextIdx=Math.floor(idx/2);
      const slot=idx%2===0?"home":"away";
      next[nextRound]=next[nextRound].map((mm,i)=>i===nextIdx?{...mm,[slot]:winner}:mm);
    }
    if(round==="final")next.champion=winner;
    await onUpdate({knockout:next});
  }
  async function editMatch(round,idx){
    const m=knockout[round][idx];
    const next={...knockout,[round]:knockout[round].map((mm,i)=>i===idx?{...mm,winner:null}:mm)};
    if(round==="final")next.champion=null;
    // If this team was already placed into the next round (fixed bracket), clear it there too
    const ri=rounds.indexOf(round);
    if(ri>=0&&ri<rounds.length-1&&drawStyle==="fixed"){
      const nextRound=rounds[ri+1];
      const nextIdx=Math.floor(idx/2);
      const slot=idx%2===0?"home":"away";
      next[nextRound]=next[nextRound].map((mm,i)=>i===nextIdx?{...mm,[slot]:"TBD"}:mm);
    }
    await onUpdate({knockout:next});
  }

  // Manually place a winner from the previous round into a TBD slot (random draw mode)
  async function placeTeam(round,idx,slot,team){
    const next={...knockout,[round]:knockout[round].map((mm,i)=>i===idx?{...mm,[slot]:team}:mm)};
    await onUpdate({knockout:next});
  }
  async function clearSlot(round,idx,slot){
    const next={...knockout,[round]:knockout[round].map((mm,i)=>i===idx?{...mm,[slot]:"TBD"}:mm)};
    await onUpdate({knockout:next});
  }

  return(
    <div className="fade-up">
      {rounds.map(round=>{
        const isRandomFillRound=drawStyle==="random"&&rounds.indexOf(round)>0;
        const isPlayoffRound=round==="playoff";
        // Rounds whose TBD slots are sourced from the playoff round (R16's "playoff winner" slots)
        // always need manual placement, since playoff results come from a real-world draw.
        const fedByPlayoff=rounds[rounds.indexOf(round)-1]==="playoff";
        const manualFillRound=isPlayoffRound||isRandomFillRound||fedByPlayoff;
        const showDrawPrompt=manualFillRound&&prevRoundComplete(round)&&knockout[round].some(m=>m.home==="TBD"||m.away==="TBD");
        return(
        <div key={round} style={{marginBottom:24}}>
          <SectionLabel>{ROUND_LABELS[round]||round}</SectionLabel>
          {showDrawPrompt&&(
            <div className="mono" style={{fontSize:11,color:C.amber,marginBottom:10,padding:"8px 12px",background:"rgba(232,185,35,0.08)",borderRadius:6,border:`1px solid ${C.amber}40`}}>
              🎟️ {isPlayoffRound?"Enter the official playoff draw — pick a seeded and unseeded team for each tie":fedByPlayoff?"Select the playoff winner that fills each TBD slot":"Enter the official draw result — select which team fills each slot below"}
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(4,knockout[round].length)},1fr)`,gap:10}}>
            {knockout[round].map((m,i)=>(
              <div key={i} style={{background:C.pitchLight,border:`1px solid ${C.pitchBorder}`,borderRadius:8,overflow:"hidden"}}>
                {[{team:m.home,field:"homeScore",slot:"home",pot:m.homePot},{team:m.away,field:"awayScore",slot:"away",pot:m.awayPot}].map(({team,field,slot,pot},si)=>{
                  const isWinner=m.winner===team;
                  const isTBD=team==="TBD";
                  const owner=assignments[team];
                  const canPlace=isTBD&&manualFillRound&&prevRoundComplete(round);
                  const options=canPlace?availableTeams(round,pot):[];
                  return(
                    <div key={si} style={{
                      display:"flex",alignItems:"center",gap:5,padding:"7px 9px",
                      borderBottom:si===0?`1px solid ${C.pitch}`:"none",
                      background:isWinner?"rgba(46,204,113,0.1)":"transparent"
                    }}>
                      {canPlace?(
                        <select value="" onChange={e=>e.target.value&&placeTeam(round,i,slot,e.target.value)} style={{
                          flex:1,fontSize:11,fontWeight:600,background:"#06140c",color:C.amber,
                          border:`1px solid ${C.amber}60`,borderRadius:5,padding:"3px 6px",cursor:"pointer"
                        }}>
                          <option value="">— Select {pot==="seeded"?"seeded":pot==="unseeded"?"unseeded":""} team —</option>
                          {options.map(t=><option key={t} value={t}>{t}</option>)}
                        </select>
                      ):(
                        <span style={{flex:1,fontSize:11,fontWeight:isWinner?700:500,color:isWinner?"#2ecc71":isTBD?C.chalkDim:C.chalk,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                          {team}{isTBD&&pot&&<span className="mono" style={{fontSize:9,color:C.amber,marginLeft:5}}>({pot==="seeded"?"seeded":"playoff winner"})</span>}
                        </span>
                      )}
                      {owner&&!isTBD&&<span className="mono" style={{fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:3,background:playerColor(owner),color:"#06140c"}}>{owner}</span>}
                      {!isTBD&&manualFillRound&&!m.winner&&prevRoundComplete(round)&&(
                        <button onClick={()=>clearSlot(round,i,slot)} style={{...miniIconBtn,fontSize:11,color:C.chalkDim}}>✕</button>
                      )}
                      <input value={m[field]} onChange={e=>updateScore(round,i,field,e.target.value)} disabled={!!m.winner||isTBD}
                        style={{...miniScoreInput,width:26,background:m.winner?C.pitch:"#06140c"}}/>
                      {si===1&&!m.winner&&!isTBD&&<button onClick={()=>confirmMatch(round,i)} style={{...miniIconBtn,color:"#2ecc71"}}>✓</button>}
                      {si===1&&m.winner&&<button onClick={()=>editMatch(round,i)} style={miniIconBtn}>✎</button>}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      );})}
      {knockout.champion&&(
        <div style={{textAlign:"center",padding:24,background:"linear-gradient(135deg,#1a2a14,#0d1a0d)",borderRadius:12,border:"1px solid #2ecc71"}}>
          <div style={{fontSize:40,marginBottom:8}}>🏆</div>
          <div className="display" style={{fontSize:22,color:"#2ecc71"}}>{knockout.champion}</div>
          {assignments[knockout.champion]&&<div className="mono" style={{fontSize:12,color:C.chalkDim,marginTop:4}}>Winner: {assignments[knockout.champion]} 🎉</div>}
        </div>
      )}
    </div>
  );
}
