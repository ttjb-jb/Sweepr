// ── SWEEPSTAKE VIEW (router) ──────────────────────────────────
// ── INVITE PANEL ──────────────────────────────────────────────
function InvitePanel({sw,user,onClose}){
  const[email,setEmail]=useState("");
  const[sending,setSending]=useState(false);
  const[sent,setSent]=useState(false);
  const[copied,setCopied]=useState(false);
  const[error,setError]=useState("");

  const inviteUrl=`${window.location.origin}${window.location.pathname}?invite=${sw.id}`;
  const unclaimedPlayers=(sw.players||[]).filter(p=>!sw.playerUserIds||!sw.playerUserIds[p]);

  function copyLink(){
    navigator.clipboard.writeText(inviteUrl).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false),2000);
    }).catch(()=>setError("Couldn't copy — long-press the link to copy manually"));
  }

  async function sendEmailInvite(e){
    e.preventDefault();
    if(!email.trim())return;
    setSending(true);setError("");
    try{
      const{db,collection,addDoc,serverTimestamp}=window._fb;
      await addDoc(collection(db,"invites"),{
        sweepstakeId:sw.id,
        sweepstakeName:sw.name,
        tournamentName:sw.tournamentName,
        inviteeEmail:email.trim().toLowerCase(),
        fromUserId:user.uid,
        fromName:user.email,
        status:"pending",
        createdAt:serverTimestamp(),
      });
      setSent(true);
      setEmail("");
      setTimeout(()=>setSent(false),3000);
    }catch(e){setError(e.message);}
    finally{setSending(false);}
  }

  return(
    <div onClick={onClose} style={{
      position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:50,
      display:"flex",alignItems:"flex-end",justifyContent:"center"
    }}>
      <div onClick={e=>e.stopPropagation()} className="fade-up" style={{
        background:C.pitchLight,borderTop:`1px solid ${C.pitchBorder}`,borderRadius:"16px 16px 0 0",
        padding:"24px 20px 32px",width:"100%",maxWidth:480,maxHeight:"85vh",overflowY:"auto"
      }}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div className="display" style={{fontSize:18}}>INVITE PLAYERS</div>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:C.chalkDim,fontSize:20,cursor:"pointer"}}>✕</button>
        </div>

        <div className="mono" style={{fontSize:12,color:C.chalkDim,marginBottom:8}}>
          Share this link — anyone who opens it can sign in and claim an unclaimed player name.
        </div>

        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <div className="mono" style={{
            flex:1,background:C.pitch,border:`1px solid ${C.pitchBorder}`,borderRadius:8,
            padding:"11px 14px",fontSize:12,color:C.chalk,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"
          }}>{inviteUrl}</div>
          <button onClick={copyLink} style={{
            background:copied?"#2ecc71":AMBER_GRADIENT,border:"none",color:C.pitch,borderRadius:8,
            padding:"0 18px",fontWeight:800,fontSize:13,cursor:"pointer",flexShrink:0
          }}>{copied?"✓ Copied":"Copy"}</button>
        </div>

        <div style={{marginTop:20,marginBottom:8}}>
          <SectionLabel noMargin>Unclaimed Players ({unclaimedPlayers.length})</SectionLabel>
        </div>
        {unclaimedPlayers.length===0?(
          <div className="mono" style={{fontSize:12,color:"#2ecc71"}}>✓ All players have joined</div>
        ):(
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:20}}>
            {unclaimedPlayers.map(p=>(
              <span key={p} className="mono" style={{fontSize:11,fontWeight:600,padding:"5px 10px",borderRadius:6,background:C.pitch,border:`1px solid ${C.pitchBorder}`,color:C.chalkDim}}>{p}</span>
            ))}
          </div>
        )}

        <div style={{height:1,background:C.pitchBorder,margin:"20px 0"}}/>

        <SectionLabel>Or Notify by Email (optional)</SectionLabel>
        <div className="mono" style={{fontSize:11,color:C.chalkDim,marginBottom:10}}>
          They'll see this sweepstake in their Invitations list if they're already a Sweepr user with this email.
        </div>
        <form onSubmit={sendEmailInvite} style={{display:"flex",gap:8}}>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="friend@example.com"
            style={{...fieldInput,flex:1}}/>
          <button type="submit" disabled={sending} style={{
            background:C.pitch,border:`1px solid ${C.pitchBorder}`,color:C.chalk,borderRadius:8,
            padding:"0 16px",fontWeight:700,fontSize:13,cursor:"pointer",flexShrink:0
          }}>{sending?"...":sent?"✓ Sent":"Send"}</button>
        </form>
        {error&&<div style={{color:C.red,fontSize:12,marginTop:8,fontWeight:600}}>{error}</div>}
      </div>
    </div>
  );
}

function SweepstakeView({user,sweepstakeId,onBack}){
  const[sw,setSw]=useState(undefined);
  const[tab,setTab]=useState("main");
  const[saving,setSaving]=useState(false);
  const[error,setError]=useState("");
  const[showInvite,setShowInvite]=useState(false);

  useEffect(()=>{
    const{db,doc,onSnapshot}=window._fb;
    const unsub=onSnapshot(doc(db,"sweepstakes",sweepstakeId),snap=>{
      if(snap.exists())setSw({id:snap.id,...snap.data()});
      else setError("Sweepstake not found");
    },err=>setError(err.message));
    return()=>unsub();
  },[sweepstakeId]);

  async function updateDoc_(patch){
    setSaving(true);
    try{
      const{db,doc,updateDoc}=window._fb;
      await updateDoc(doc(db,"sweepstakes",sweepstakeId),patch);
    }catch(e){setError(e.message);}
    finally{setSaving(false);}
  }

  async function saveDraw(assignments){
    const patch={assignments,status:"live"};
    // Pure knockout: build the bracket immediately from the team list (random order, since the
    // organiser will confirm the real draw order via the "Confirm Draw & Start" step itself —
    // teams array order is treated as the entry order/seeding).
    if(sw.format==="knockout"&&!sw.knockout){
      patch.knockout=buildKnockoutBracket(sw.teams||[]);
    }
    // League / League+Knockout: turn the configured fixture list into the live fixtures array
    if((sw.format==="league"||sw.format==="league_knockout")&&!(sw.fixtures&&sw.fixtures.length)){
      if(sw.presetFixtures&&sw.presetFixtures.length){
        // Real fixture list with dates (e.g. Premier League official schedule)
        patch.fixtures=sw.presetFixtures.map(({date,home,away},i)=>({
          id:`preset_${i}_${home}_${away}`,
          date,home,away,homeScore:"",awayScore:"",played:false
        }));
      }else if(sw.leaguePhaseType==="swiss"&&sw.swissFixtures&&sw.swissFixtures.length){
        patch.fixtures=sw.swissFixtures.map((fx,i)=>({
          id:`swiss_${i}_${fx.home}_${fx.away}`,
          home:fx.home,away:fx.away,homeScore:"",awayScore:"",played:false
        }));
      }else{
        patch.fixtures=generateLeagueFixtures(sw.teams||[]);
      }
    }
    await updateDoc_(patch);
  }

  async function buildKnockout(){
    if(!sw.groups)return;
    const standings=recalcGroupStandings(sw.groups,sw.matches||generateGroupMatches(sw.groups));
    const qualifiers=buildQualifiers(sw.groups,standings);
    if(qualifiers.length<2){setError("Not enough qualifiers to build a bracket");return;}
    const knockout=buildKnockoutBracket(qualifiers);
    await updateDoc_({knockout});
    setTab("knockout");
  }

  async function buildKnockoutFromLeague(){
    const fixtures=sw.fixtures||[];
    if(!fixtures.length)return;
    const standings=recalcLeagueStandings(sw.teams||[],fixtures);
    const direct=sw.directQualifiers||standings.length;
    const playoff=sw.playoffSpots||0;

    const directTeams=standings.slice(0,direct).map(s=>s.team);
    const playoffTeams=standings.slice(direct,direct+playoff).map(s=>s.team);

    let knockout;
    if(playoffTeams.length>=2){
      const playoffWinnersCount=Math.floor(playoffTeams.length/2);
      // Interleave: each match must pair one direct qualifier (seeded) with one playoff-winner slot (unseeded)
      const interleaved=[];
      for(let i=0;i<Math.max(directTeams.length,playoffWinnersCount);i++){
        if(i<directTeams.length)interleaved.push(directTeams[i]);
        if(i<playoffWinnersCount)interleaved.push("TBD");
      }
      knockout=buildKnockoutBracket(interleaved);
      const firstRound=knockout.roundOrder[0];
      // Tag each slot in the first round with its pot: "seeded" (direct qualifier) or "unseeded" (playoff winner, TBD)
      knockout[firstRound]=knockout[firstRound].map(m=>({
        ...m,
        homePot:m.home==="TBD"?"unseeded":"seeded",
        awayPot:m.away==="TBD"?"unseeded":"seeded",
      }));
      // Playoff round: split into seeded (better-ranked half) and unseeded (worse-ranked half) pots.
      // Each tie is one seeded vs one unseeded team — organiser picks the actual pairing
      // and which specific teams play, matching the real Champions League playoff draw.
      const seededPool=playoffTeams.slice(0,playoffWinnersCount);
      const unseededPool=playoffTeams.slice(playoffWinnersCount,playoffWinnersCount*2);
      const playoffMatches=[];
      for(let i=0;i<playoffWinnersCount;i++){
        playoffMatches.push({home:"TBD",away:"TBD",homeScore:"",awayScore:"",winner:null,homePot:"seeded",awayPot:"unseeded"});
      }
      knockout.playoff=playoffMatches;
      knockout.playoffPots={seeded:seededPool,unseeded:unseededPool};
      knockout.roundOrder=["playoff",...knockout.roundOrder];
    }else{
      knockout=buildKnockoutBracket(directTeams);
    }
    await updateDoc_({knockout});
    setTab("knockout");
  }

  if(error){
    return(
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{color:C.red,marginBottom:16}}>⚠ {error}</div>
        <button onClick={onBack} style={pillBtn}>← Back to Dashboard</button>
      </div>
    );
  }
  if(sw===undefined){
    return(
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div className="display" style={{fontSize:32,opacity:0.3}}>SWEEPR</div>
      </div>
    );
  }

  const needsDraw=!sw.assignments||Object.keys(sw.assignments).length===0;
  const formatMeta=FORMATS.find(f=>f.id===sw.format);

  // Determine tabs based on format
  const tabs=needsDraw?["draw"]:(()=>{
    switch(sw.format){
      case "league": return["table","leaderboard"];
      case "groups_knockout": return["groups","knockout","leaderboard"];
      case "league_knockout": return["table","knockout","leaderboard"];
      case "knockout": return["knockout","leaderboard"];
      default: return["leaderboard"];
    }
  })();

  const activeTab=tabs.includes(tab)?tab:tabs[0];

  const tabLabels={table:"League Table",groups:"Groups",knockout:"Knockout",leaderboard:"Leaderboard",draw:"The Draw"};

  return(
    <div style={{minHeight:"100vh"}}>
      <div style={{borderBottom:`1px solid ${C.pitchBorder}`,padding:"0 20px"}}>
        <div style={{maxWidth:900,margin:"0 auto",padding:"18px 0"}}>
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
            <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.pitchBorder}`,color:C.chalkDim,borderRadius:6,width:34,height:34,cursor:"pointer",fontSize:16,flexShrink:0}}>←</button>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:800,fontSize:17,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{sw.name}</div>
              <div className="mono" style={{fontSize:11,color:C.chalkDim}}>{sw.tournamentName} · {formatMeta?.label}</div>
            </div>
            {saving&&<div className="mono" style={{fontSize:10,color:C.amber,flexShrink:0}}>Saving...</div>}
            {sw.ownerId===user.uid&&(
              <button onClick={()=>setShowInvite(true)} style={{
                background:"transparent",border:`1px solid ${C.amber}`,color:C.amber,borderRadius:6,
                padding:"7px 12px",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",gap:5
              }}>👥 Invite</button>
            )}
          </div>
          {!needsDraw&&(
            <div style={{display:"flex",gap:4,overflowX:"auto"}}>
              {tabs.map(t=>(
                <button key={t} onClick={()=>setTab(t)} style={{
                  background:activeTab===t?C.amber:"transparent",
                  color:activeTab===t?C.pitch:C.chalkDim,
                  border:"none",borderRadius:"6px 6px 0 0",padding:"8px 16px",
                  fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap"
                }}>{tabLabels[t]}</button>
              ))}
            </div>
          )}
        </div>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"24px 20px 60px"}}>
        {needsDraw&&<DrawScreen sw={sw} onSave={saveDraw} saving={saving}/>}
        {!needsDraw&&activeTab==="table"&&<LeagueView sw={sw} onUpdate={updateDoc_} onBuildKnockout={buildKnockoutFromLeague}/>}
        {!needsDraw&&activeTab==="leaderboard"&&<LeaderboardView sw={sw}/>}
        {!needsDraw&&activeTab==="groups"&&<GroupsView sw={sw} onUpdate={updateDoc_} onBuildKnockout={buildKnockout}/>}
        {!needsDraw&&activeTab==="knockout"&&(
          sw.knockout
            ?<KnockoutView sw={sw} onUpdate={updateDoc_}/>
            :sw.format==="groups_knockout"
              ?(
                <div className="fade-up" style={{textAlign:"center",padding:"60px 20px",color:C.chalkDim}}>
                  <div style={{fontSize:40,marginBottom:12}}>🏆</div>
                  <div style={{fontWeight:700,marginBottom:6}}>No bracket yet</div>
                  <div className="mono" style={{fontSize:12,marginBottom:16}}>Finish the group stage, then build the knockout bracket from the Groups tab</div>
                  <button onClick={()=>setTab("groups")} style={pillBtn}>← Go to Groups</button>
                </div>
              )
              :sw.format==="league_knockout"
                ?(
                  <div className="fade-up" style={{textAlign:"center",padding:"60px 20px",color:C.chalkDim}}>
                    <div style={{fontSize:40,marginBottom:12}}>🏆</div>
                    <div style={{fontWeight:700,marginBottom:6}}>No bracket yet</div>
                    <div className="mono" style={{fontSize:12,marginBottom:16}}>Finish the league phase, then build the knockout bracket from the Table tab</div>
                    <button onClick={()=>setTab("table")} style={pillBtn}>← Go to Table</button>
                  </div>
                )
                :(
                  <div className="fade-up" style={{textAlign:"center",padding:"60px 20px",color:C.chalkDim}}>
                    <div style={{fontSize:40,marginBottom:12}}>🚧</div>
                    <div style={{fontWeight:700,marginBottom:6}}>Knockout bracket coming next</div>
                    <div className="mono" style={{fontSize:12}}>This format's knockout screen is being built</div>
                  </div>
                )
        )}
      </div>
      {showInvite&&<InvitePanel sw={sw} user={user} onClose={()=>setShowInvite(false)}/>}
    </div>
  );
}

// ── JOIN SWEEPSTAKE (via invite link) ─────────────────────────
function JoinSweepstake({user,inviteId,onDone}){
  const[sw,setSw]=useState(undefined);
  const[error,setError]=useState("");
  const[joining,setJoining]=useState(false);

  useEffect(()=>{
    const{db,doc,getDoc}=window._fb;
    getDoc(doc(db,"sweepstakes",inviteId)).then(snap=>{
      if(snap.exists())setSw({id:snap.id,...snap.data()});
      else setError("This invite link is invalid or the sweepstake no longer exists.");
    }).catch(e=>setError(e.message));
  },[inviteId]);

  async function claimPlayer(playerName){
    setJoining(true);setError("");
    try{
      const{db,doc,updateDoc,arrayUnion}=window._fb;
      await updateDoc(doc(db,"sweepstakes",inviteId),{
        memberIds:arrayUnion(user.uid),
        [`playerUserIds.${playerName}`]:user.uid,
      });
      onDone(inviteId);
    }catch(e){setError(e.message);setJoining(false);}
  }

  if(error){
    return(
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{color:C.red,marginBottom:16,textAlign:"center"}} className="mono">⚠ {error}</div>
        <button onClick={()=>onDone(null)} style={pillBtn}>← Go to Dashboard</button>
      </div>
    );
  }
  if(sw===undefined){
    return(
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div className="display" style={{fontSize:32,opacity:0.3}}>SWEEPR</div>
      </div>
    );
  }

  // Already a member? Just go straight in.
  const alreadyMember=(sw.memberIds||[]).includes(user.uid)||sw.ownerId===user.uid;
  if(alreadyMember){
    onDone(inviteId);
    return null;
  }

  const unclaimedPlayers=(sw.players||[]).filter(p=>!sw.playerUserIds||!sw.playerUserIds[p]);

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div className="fade-up" style={{width:"100%",maxWidth:420}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:36,marginBottom:10}}>🎟️</div>
          <div className="display" style={{fontSize:22,marginBottom:6}}>{sw.name}</div>
          <div className="mono" style={{fontSize:12,color:C.chalkDim}}>{sw.tournamentName}</div>
        </div>

        <div style={{background:C.pitchLight,border:`1px solid ${C.pitchBorder}`,borderRadius:14,padding:24}}>
          {unclaimedPlayers.length===0?(
            <div style={{textAlign:"center"}}>
              <div className="mono" style={{fontSize:13,color:C.chalkDim,marginBottom:16}}>
                All player slots in this sweepstake have already been claimed. Ask the organiser to add your name if you should be included.
              </div>
              <button onClick={()=>onDone(null)} style={pillBtn}>← Go to Dashboard</button>
            </div>
          ):(
            <>
              <div className="mono" style={{fontSize:12,color:C.chalkDim,marginBottom:14,textAlign:"center"}}>
                Which name is yours?
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {unclaimedPlayers.map(p=>(
                  <button key={p} onClick={()=>claimPlayer(p)} disabled={joining} style={{
                    background:C.pitch,border:`1px solid ${C.pitchBorder}`,color:C.chalk,borderRadius:8,
                    padding:"12px 16px",fontWeight:700,fontSize:14,cursor:joining?"default":"pointer",
                    textAlign:"left",opacity:joining?0.6:1
                  }}>{p}</button>
                ))}
              </div>
              {error&&<div style={{color:C.red,fontSize:12,marginTop:12,fontWeight:600}}>{error}</div>}
            </>
          )}
        </div>

        <div style={{textAlign:"center",marginTop:16}}>
          <button onClick={()=>onDone(null)} className="mono" style={{background:"transparent",border:"none",color:C.chalkDim,fontSize:12,cursor:"pointer"}}>
            Not your sweepstake? Go to Dashboard
          </button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const[user,setUser]=useState(undefined); // undefined=loading, null=logged out, object=logged in
  const[screen,setScreen]=useState("dashboard");
  const[openSweepstakeId,setOpenSweepstakeId]=useState(null);
  const[authError,setAuthError]=useState("");
  const[inviteId,setInviteId]=useState(()=>{
    try{
      return new URLSearchParams(window.location.search).get("invite");
    }catch(e){return null;}
  });

  useEffect(()=>{
    const wait=()=>{
      if(!window._fb){setTimeout(wait,100);return;}
      const{auth,onAuthStateChanged}=window._fb;
      onAuthStateChanged(auth,u=>setUser(u));
    };
    wait();
  },[]);

  async function handleLogout(){
    const{auth,signOut}=window._fb;
    await signOut(auth);
  }

  if(user===undefined){
    return(
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div className="display" style={{fontSize:32,opacity:0.3}}>SWEEPR</div>
      </div>
    );
  }

  if(!user){
    return <LoginScreen initialError={authError} inviteId={inviteId}/>;
  }

  if(inviteId){
    return <JoinSweepstake user={user} inviteId={inviteId} onDone={(swId)=>{
      // Clear the invite param from the URL and from state, so we don't loop back here
      window.history.replaceState({},"",window.location.pathname);
      setInviteId(null);
      if(swId){setOpenSweepstakeId(swId);setScreen("view");}
      else setScreen("dashboard");
    }}/>;
  }

  if(screen==="create"){
    return <CreateSweepstake user={user} onBack={()=>setScreen("dashboard")} onCreated={(id)=>setScreen("dashboard")}/>;
  }

  if(screen==="view"&&openSweepstakeId){
    return <SweepstakeView user={user} sweepstakeId={openSweepstakeId} onBack={()=>{setScreen("dashboard");setOpenSweepstakeId(null);}}/>;
  }

  if(screen==="presets"){
    return <ManagePresets user={user} onBack={()=>setScreen("dashboard")}/>;
  }

  if(screen==="leaderboard"){
    return <GlobalLeaderboard user={user} onBack={()=>setScreen("dashboard")}/>;
  }

  return(
    <Dashboard
      user={user}
      onLogout={handleLogout}
      onOpenSweepstake={sw=>{setOpenSweepstakeId(sw.id);setScreen("view");}}
      onCreateNew={()=>setScreen("create")}
      onJoinViaInvite={(swId)=>setInviteId(swId)}
      onManagePresets={()=>setScreen("presets")}
      onGlobalLeaderboard={()=>setScreen("leaderboard")}
    />
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
